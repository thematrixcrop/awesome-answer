name: Publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true

      - name: Resolve upstream Answer release
        id: answer
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          release_json="$(curl \
            --fail-with-body \
            --location \
            --retry 3 \
            --retry-all-errors \
            --silent \
            --show-error \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --header "User-Agent: awesome-answer-publisher" \
            "https://api.github.com/repos/apache/answer/releases/latest")"

          if ! answer_tag="$(jq -er \
            '.tag_name | select(type == "string" and length > 0)' \
            <<< "${release_json}")"; then
            echo "::error title=Invalid upstream release::The latest Apache Answer release has no usable tag_name."
            exit 1
          fi

          if jq -e '(.draft == true) or (.prerelease == true)' <<< "${release_json}" >/dev/null; then
            echo "::error title=Unsupported upstream release::The latest Apache Answer release is a draft or pre-release."
            exit 1
          fi

          if [[ ! "${answer_tag}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error title=Invalid upstream release tag::Expected vMAJOR.MINOR.PATCH, received ${answer_tag}."
            exit 1
          fi

          answer_docker_tag="${answer_tag#v}"
          if [[ ! "${answer_docker_tag}" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error title=Invalid Docker Hub tag::Unable to derive a stable Docker Hub tag from ${answer_tag}."
            exit 1
          fi
          if (( ${#answer_docker_tag} > 128 )); then
            echo "::error title=Invalid Docker Hub tag::The derived tag from ${answer_tag} exceeds Docker's 128-character limit."
            exit 1
          fi

          build_date="$(date -u +%Y%m%d)"
          if [[ ! "${build_date}" =~ ^[0-9]{8}$ ]]; then
            echo "::error title=Invalid build date::UTC build date must be YYYYMMDD, received ${build_date}."
            exit 1
          fi

          image_tag="${answer_tag}_${build_date}"
          if [[ ! "${image_tag}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)_[0-9]{8}$ ]]; then
            echo "::error title=Invalid image tag::Unable to construct a valid dated image tag from ${answer_tag}."
            exit 1
          fi
          if (( ${#image_tag} > 128 )); then
            echo "::error title=Invalid image tag::The dated tag ${image_tag} exceeds Docker's 128-character limit."
            exit 1
          fi

          {
            echo "answer_tag=${answer_tag}"
            echo "answer_docker_tag=${answer_docker_tag}"
            echo "build_date=${build_date}"
            echo "image_tag=${image_tag}"
          } >> "${GITHUB_OUTPUT}"

          echo "::notice title=Upstream Answer release::${answer_tag} (Docker Hub ${answer_docker_tag})"
          echo "::notice title=Dated image tag::${image_tag}"

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install renderer dependencies
        run: npm ci

      - name: Render Dockerfile
        run: npm run render:dockerfile -- --answer-tag "${{ steps.answer.outputs.answer_tag }}"

      - name: Read generated plugin manifest
        id: plugins
        shell: bash
        run: |
          set -euo pipefail

          manifest_path=".generated/plugins-manifest.json"
          blacklist_path="plugins-blacklist.json"
          sha256="$(jq -er '.sha256 | select(test("^[a-f0-9]{64}$"))' "${manifest_path}")"
          blacklist_sha256="$(sha256sum "${blacklist_path}" | awk '{print $1}')"
          [[ "${blacklist_sha256}" =~ ^[a-f0-9]{64}$ ]]
          plugin_count="$(jq -er '.pluginCount | select(type == "number" and . > 0)' "${manifest_path}")"
          source="$(jq -er '.source | select(type == "string" and length > 0)' "${manifest_path}")"

          {
            echo "sha256=${sha256}"
            echo "blacklist_sha256=${blacklist_sha256}"
            echo "plugin_count=${plugin_count}"
            echo "source=${source}"
          } >> "${GITHUB_OUTPUT}"

          echo "::notice title=Plugin manifest::SHA-256 ${sha256}; blacklist ${blacklist_sha256}; plugins ${plugin_count}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Decide whether to publish
        id: publish-check
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EXPECTED_SHA256: ${{ steps.plugins.outputs.sha256 }}
          EXPECTED_BLACKLIST_SHA256: ${{ steps.plugins.outputs.blacklist_sha256 }}
          EXPECTED_ANSWER_TAG: ${{ steps.answer.outputs.answer_tag }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          set -euo pipefail

          should_build="true"
          reason="${EVENT_NAME} events always publish"

          if [[ "${EVENT_NAME}" == "schedule" ]]; then
            labels=""
            if ! labels="$(docker buildx imagetools inspect \
              "${IMAGE}:latest" \
              --format '{{json .Image.Config.Labels}}')"; then
              reason="latest image is unavailable"
              echo "::warning title=Image inspection failed::Unable to inspect ${IMAGE}:latest; the scheduled build will run."
            elif ! jq -e 'type == "object"' <<< "${labels}" >/dev/null; then
              reason="latest image labels could not be parsed"
              echo "::warning title=Invalid image metadata::Unable to parse labels from ${IMAGE}:latest; the scheduled build will run."
            else
              current_sha256="$(jq -r \
                '.["io.awesome-answer.plugins.manifest-sha256"] // ""' \
                <<< "${labels}")"
              current_blacklist_sha256="$(jq -r \
                '.["io.awesome-answer.plugins.blacklist-sha256"] // ""' \
                <<< "${labels}")"
              current_answer_tag="$(jq -r \
                '.["io.awesome-answer.upstream.answer-tag"] // ""' \
                <<< "${labels}")"

              if [[ -z "${current_sha256}" ]]; then
                reason="latest image has no plugin manifest label"
              elif [[ ! "${current_sha256}" =~ ^[a-f0-9]{64}$ ]]; then
                reason="latest image has an invalid plugin manifest label"
              elif [[ -z "${current_blacklist_sha256}" ]]; then
                reason="latest image has no plugin blacklist label"
              elif [[ ! "${current_blacklist_sha256}" =~ ^[a-f0-9]{64}$ ]]; then
                reason="latest image has an invalid plugin blacklist label"
              elif [[ -z "${current_answer_tag}" ]]; then
                reason="latest image has no upstream Answer tag label"
              elif [[ ! "${current_answer_tag}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
                reason="latest image has an invalid upstream Answer tag label"
              elif [[ "${current_sha256}" == "${EXPECTED_SHA256}" && \
                "${current_blacklist_sha256}" == "${EXPECTED_BLACKLIST_SHA256}" && \
                "${current_answer_tag}" == "${EXPECTED_ANSWER_TAG}" ]]; then
                should_build="false"
                reason="latest image already uses the current plugin manifest, blacklist, and upstream Answer version"
              else
                reason="plugin manifest, blacklist, or upstream Answer version changed"
              fi
            fi
          fi

          {
            echo "should_build=${should_build}"
            echo "reason=${reason}"
          } >> "${GITHUB_OUTPUT}"

          echo "::notice title=Publish decision::${reason}"

      - name: Extract Docker metadata
        id: meta
        if: steps.publish-check.outputs.should_build == 'true'
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: latest=false
          tags: |
            type=raw,value=${{ steps.answer.outputs.image_tag }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.answer.outputs.image_tag }}
            io.awesome-answer.upstream.answer-tag=${{ steps.answer.outputs.answer_tag }}
            io.awesome-answer.plugins.manifest-sha256=${{ steps.plugins.outputs.sha256 }}
            io.awesome-answer.plugins.blacklist-sha256=${{ steps.plugins.outputs.blacklist_sha256 }}
            io.awesome-answer.plugins.count=${{ steps.plugins.outputs.plugin_count }}
            io.awesome-answer.plugins.source=${{ steps.plugins.outputs.source }}

      - name: Build and push Docker image
        id: build
        if: steps.publish-check.outputs.should_build == 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./.generated/Dockerfile
          platforms: linux/amd64
          pull: true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=awesome-answer-linux-amd64
          cache-to: type=gha,mode=max,scope=awesome-answer-linux-amd64

      - name: Inspect published image digest
        if: steps.publish-check.outputs.should_build == 'true'
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          test -n "${DIGEST}"
          docker buildx imagetools inspect "${IMAGE}@${DIGEST}"

      - name: Resolve published image metadata
        id: published
        shell: bash
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          set -euo pipefail

          labels="$(docker buildx imagetools inspect "${IMAGE}:latest" --format '{{json .Image.Config.Labels}}')"
          answer_tag="$(jq -er '."io.awesome-answer.upstream.answer-tag" | select(test("^v(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)$"))' <<< "${labels}")"
          image_tag="$(jq -er '."org.opencontainers.image.version" | select(test("^v(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)_[0-9]{8}$"))' <<< "${labels}")"
          manifest_sha256="$(jq -er '."io.awesome-answer.plugins.manifest-sha256" | select(test("^[a-f0-9]{64}$"))' <<< "${labels}")"
          blacklist_sha256="$(jq -er '."io.awesome-answer.plugins.blacklist-sha256" | select(test("^[a-f0-9]{64}$"))' <<< "${labels}")"
          plugin_count="$(jq -er '."io.awesome-answer.plugins.count" | tonumber | select(. > 0)' <<< "${labels}")"

          {
            echo "answer_tag=${answer_tag}"
            echo "image_tag=${image_tag}"
            echo "manifest_sha256=${manifest_sha256}"
            echo "blacklist_sha256=${blacklist_sha256}"
            echo "plugin_count=${plugin_count}"
            echo "platform=linux/amd64"
          } >> "${GITHUB_OUTPUT}"

      - name: Update README snapshot
        run: |
          npm run update:readme -- \
            --answer-tag "${{ steps.published.outputs.answer_tag }}" \
            --image-tag "${{ steps.published.outputs.image_tag }}" \
            --plugin-count "${{ steps.published.outputs.plugin_count }}" \
            --manifest-sha256 "${{ steps.published.outputs.manifest_sha256 }}" \
            --blacklist-sha256 "${{ steps.published.outputs.blacklist_sha256 }}" \
            --platform "${{ steps.published.outputs.platform }}"

      - name: Commit and push README snapshot
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- README.md; then
            echo "README snapshot is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git rebase origin/main
          git diff --check
          git add README.md
          git diff --cached --check
          git commit -m "docs(readme): update published image snapshot"
          git push origin HEAD:main
